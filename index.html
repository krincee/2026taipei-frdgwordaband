<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>台北 frd 過打band 2026 三人成行之旅✦</title>
    <style>
      :root {
        --bg1: #fff6fb;
        --bg2: #eef7ff;
        --bg3: #f1eeff;
        --card: rgba(255, 255, 255, 0.78);
        --card-strong: rgba(255, 255, 255, 0.9);
        --text: #4c5566;
        --text-strong: #2e3440;
        --pink: #f8bfd6;
        --pink-strong: #ef78ab;
        --blue: #b9dcff;
        --blue-strong: #6f9fdf;
        --cyan: #c7f0ff;
        --yellow: #ffe9a8;
        --shadow: 0 18px 50px rgba(137, 167, 220, 0.16);
        --radius: 28px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(255,255,255,0.98), rgba(255,237,248,0.95), rgba(232,243,255,0.95), rgba(232,229,255,0.93));
        min-height: 100vh;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app {
        max-width: 1120px;
        margin: 0 auto;
        padding: 20px 16px 110px;
      }

      .glass {
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      .hero {
        position: relative;
        overflow: hidden;
        border-radius: 34px;
        padding: 24px;
      }

      .hero::before,
      .hero::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(44px);
        pointer-events: none;
      }

      .hero::before {
        width: 160px;
        height: 160px;
        top: -20px;
        right: -40px;
        background: rgba(255, 191, 214, 0.4);
      }

      .hero::after {
        width: 140px;
        height: 140px;
        left: -24px;
        bottom: -24px;
        background: rgba(185, 220, 255, 0.45);
      }

      .hero-top {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .title {
        margin: 0;
        font-size: clamp(1.9rem, 4vw, 3.5rem);
        line-height: 1.1;
        color: var(--text-strong);
        letter-spacing: 0.02em;
        font-weight: 900;
      }

      .sub {
        margin-top: 12px;
        font-size: 0.98rem;
        line-height: 1.7;
      }

      .rate-box {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.75);
        border-radius: 24px;
        padding: 14px 16px;
        box-shadow: 0 10px 26px rgba(145, 170, 235, 0.12);
      }

      .rate-box small {
        display: block;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #94a0b8;
        font-weight: 700;
        font-size: 0.72rem;
      }

      .rate-box strong {
        display: block;
        margin-top: 8px;
        color: var(--text-strong);
        font-size: 1.6rem;
      }

      .day-row {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding: 18px 2px 2px;
      }

      .day-chip {
        min-width: 94px;
        border: 1px solid rgba(255,255,255,0.75);
        background: rgba(255,255,255,0.82);
        border-radius: 24px;
        padding: 14px 16px;
        text-align: center;
        color: #6c7386;
        box-shadow: 0 10px 28px rgba(145, 170, 235, 0.1);
        cursor: pointer;
      }

      .day-chip.active {
        color: #fff;
        border-color: #b7d7ff;
        background: linear-gradient(180deg, #8ab6ff 0%, #6d95dc 100%);
        box-shadow: 0 14px 30px rgba(109, 149, 220, 0.3);
      }

      .day-chip .label {
        font-size: 0.92rem;
        font-weight: 700;
      }

      .day-chip .num {
        margin-top: 2px;
        font-size: 1.6rem;
        font-weight: 900;
      }

      .page {
        display: none;
        margin-top: 18px;
      }

      .page.active {
        display: block;
      }

      .section-card {
        border-radius: 30px;
        padding: 20px;
        margin-bottom: 18px;
      }

      .summary-card {
        display: flex;
        flex-direction: column;
        gap: 16px;
        border-radius: 30px;
        padding: 20px;
        background: linear-gradient(135deg, rgba(218,242,255,0.95), rgba(255,242,248,0.95));
      }

      .summary-head {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .summary-head h2 {
        margin: 0;
        font-size: 2rem;
        color: var(--text-strong);
      }

      .date-pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: rgba(255,255,255,0.78);
        padding: 6px 12px;
        font-size: 0.8rem;
        font-weight: 700;
        box-shadow: 0 6px 18px rgba(145,170,235,0.12);
        width: fit-content;
      }

      .weather-box {
        border-radius: 24px;
        background: rgba(255,255,255,0.82);
        padding: 16px 18px;
        box-shadow: 0 10px 24px rgba(145, 170, 235, 0.12);
      }

      .weather-main {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--text-strong);
      }

      .weather-sub {
        margin-top: 8px;
        font-size: 0.92rem;
        color: #7b8399;
      }

      .itinerary-list,
      .record-list,
      .checklist-grid,
      .milk-list {
        display: grid;
        gap: 16px;
      }

      .itinerary-card {
        position: relative;
        overflow: hidden;
        border-radius: 30px;
        padding: 20px;
      }

      .stop-tag {
        position: absolute;
        top: 16px;
        right: 16px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(255, 232, 241, 0.95);
        color: #d35e8c;
        font-size: 0.76rem;
        font-weight: 800;
      }

      .time-row {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #7a8297;
        font-weight: 700;
        font-size: 0.9rem;
      }

      .itinerary-card h3 {
        margin: 14px 0 0;
        font-size: 1.75rem;
        line-height: 1.15;
        color: var(--text-strong);
      }

      .desc {
        margin-top: 12px;
        line-height: 1.75;
        font-size: 0.95rem;
      }

      .info-blocks {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .info-line,
      .milk-box,
      .transit-box,
      .photo-box,
      .check-item,
      .row-card,
      .mini-card,
      .input,
      .btn,
      .king-card,
      .challenge-card {
        border-radius: 20px;
      }

      .info-line,
      .photo-box,
      .row-card,
      .mini-card,
      .input {
        background: rgba(255,255,255,0.75);
      }

      .info-line,
      .photo-box,
      .row-card,
      .transit-box,
      .milk-box,
      .challenge-card,
      .king-card,
      .mini-card {
        box-shadow: 0 10px 24px rgba(145,170,235,0.1);
      }

      .info-line,
      .photo-box,
      .row-card,
      .transit-box,
      .milk-box,
      .challenge-card,
      .king-card {
        padding: 14px 16px;
      }

      .info-line {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .map-link span {
        text-decoration: underline;
        text-decoration-color: #8fd8ff;
        text-underline-offset: 3px;
      }

      .milk-box {
        background: linear-gradient(90deg, #fff4f9, #ffffff, #f7f3ff);
      }

      .block-title {
        font-size: 0.9rem;
        font-weight: 800;
        color: var(--text-strong);
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .milk-items,
      .transit-items,
      .challenge-items {
        display: grid;
        gap: 8px;
      }

      .pill {
        padding: 10px 12px;
        background: rgba(255,255,255,0.74);
        border-radius: 16px;
        font-size: 0.92rem;
      }

      .transit-box {
        background: #f7fbff;
      }

      .return-card,
      .walk-card {
        border-radius: 28px;
        padding: 18px;
      }

      .walk-card {
        font-weight: 700;
      }

      .checklist-grid {
        grid-template-columns: 1fr;
      }

      .check-group h3,
      .panel-title {
        margin: 0 0 14px;
        font-size: 1.2rem;
        color: var(--text-strong);
      }

      .check-items {
        display: grid;
        gap: 10px;
      }

      .check-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 13px 14px;
        background: rgba(255,255,255,0.75);
        cursor: pointer;
      }

      .check-item.done span:last-child {
        text-decoration: line-through;
        color: #a0a7ba;
      }

      .checkbox {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid #c7cde0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 0.78rem;
        flex-shrink: 0;
      }

      .check-item.done .checkbox {
        background: var(--pink-strong);
        border-color: var(--pink-strong);
      }

      .stats-grid,
      .info-grid {
        display: grid;
        gap: 14px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .mini-card {
        padding: 18px;
        border: 1px solid rgba(255,255,255,0.65);
      }

      .mini-card small {
        display: block;
        color: #9ba3b8;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-weight: 800;
      }

      .mini-card strong {
        display: block;
        margin-top: 10px;
        font-size: 1.95rem;
        color: var(--text-strong);
      }

      .input-grid {
        display: grid;
        gap: 12px;
      }

      .input,
      select,
      textarea {
        width: 100%;
        border: 1px solid rgba(255,255,255,0.7);
        padding: 13px 14px;
        font: inherit;
        color: var(--text);
        background: rgba(255,255,255,0.8);
        outline: none;
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      .btn {
        border: none;
        cursor: pointer;
        padding: 13px 16px;
        font: inherit;
        font-weight: 800;
        color: var(--text-strong);
        background: linear-gradient(90deg, #f7c6dd, #c8efff);
      }

      .btn-outline {
        background: rgba(255,255,255,0.85);
        border: 1px solid #dbe2f0;
        font-weight: 700;
      }

      .row-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
      }

      .row-top {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .amount-pill,
      .king-badge,
      .rank-dot,
      .soft-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .amount-pill,
      .soft-pill {
        border-radius: 999px;
        padding: 10px 14px;
        font-weight: 800;
      }

      .amount-pill {
        background: #fff1f7;
      }

      .king-card {
        background: linear-gradient(90deg, #fff3ad, #ffe8f2, #dff7ff);
      }

      .king-title {
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.8rem;
        font-weight: 800;
      }

      .king-card h2 {
        margin: 14px 0 0;
        color: var(--text-strong);
        font-size: 2rem;
      }

      .rank-item {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .rank-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .rank-dot {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(90deg, #f6c8dd, #c8efff);
        font-weight: 800;
        color: var(--text-strong);
      }

      .king-badge {
        padding: 6px 10px;
        border-radius: 999px;
        background: #fff3ae;
        color: #8e6700;
        font-size: 0.72rem;
        font-weight: 800;
      }

      .stars {
        display: flex;
        gap: 6px;
      }

      .star-btn {
        background: transparent;
        border: none;
        cursor: pointer;
        font-size: 1.15rem;
        color: #d4d7e2;
        padding: 0;
      }

      .star-btn.active {
        color: #f6b41b;
      }

      .bottom-nav {
        position: fixed;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        width: min(92%, 980px);
        padding: 8px;
        border-radius: 30px;
        background: rgba(255,255,255,0.82);
        border: 1px solid rgba(255,255,255,0.75);
        backdrop-filter: blur(18px);
        box-shadow: 0 20px 60px rgba(145,170,235,0.2);
        z-index: 50;
      }

      .bottom-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }

      .nav-btn {
        border: none;
        border-radius: 22px;
        padding: 10px 6px;
        background: rgba(255,255,255,0.55);
        color: #6d758a;
        cursor: pointer;
        font: inherit;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .nav-btn.active {
        background: linear-gradient(180deg, #f7d2e7, #fceef8, #dbf5ff);
        color: var(--text-strong);
        box-shadow: 0 10px 20px rgba(145,170,235,0.12);
      }

      .nav-icon {
        display: block;
        font-size: 1rem;
        margin-bottom: 4px;
      }

      .hidden {
        display: none !important;
      }

      .photo-preview {
        margin-top: 10px;
        width: 100%;
        border-radius: 20px;
        overflow: hidden;
        background: #f8fbff;
        border: 1px solid rgba(255,255,255,0.75);
      }

      .photo-preview img {
        display: block;
        width: 100%;
        max-height: 240px;
        object-fit: cover;
      }

      @media (min-width: 760px) {
        .hero-top {
          flex-direction: row;
          justify-content: space-between;
          align-items: flex-start;
        }

        .summary-head {
          flex-direction: row;
          justify-content: space-between;
          align-items: center;
        }

        .checklist-grid {
          grid-template-columns: repeat(2, 1fr);
        }

        .stats-grid {
          grid-template-columns: repeat(3, 1fr);
        }

        .info-grid {
          grid-template-columns: repeat(5, 1fr);
        }

        .input-grid.two {
          grid-template-columns: repeat(2, 1fr);
        }

        .input-grid.three {
          grid-template-columns: repeat(3, 1fr);
        }

        .input-grid.four {
          grid-template-columns: repeat(4, 1fr);
        }

        .row-card {
          flex-direction: row;
          justify-content: space-between;
          align-items: flex-start;
        }

        .row-top {
          flex: 1;
        }

        .row-side {
          width: 280px;
          display: grid;
          gap: 12px;
        }
      }
    </style>
  </head>

      function buildChecklistDefault() {
        const checklistState = {};
        Object.entries(packingChecklistData).forEach(([category, items]) => {
          items.forEach((item) => {
            checklistState[`${category}-${item}`] = false;
          });
        });
        return checklistState;
      }

      function loadState() {
        const checklistState = buildChecklistDefault();
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return { ...defaultData, checklistState };
          const saved = JSON.parse(raw);
          return {
            ...defaultData,
            ...saved,
            checklistState: { ...checklistState, ...(saved.checklistState || {}) },
          };
        } catch {
          return { ...defaultData, checklistState };
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

          });
        });
      }

      function renderShoppingPage() {
        const root = document.getElementById("page-shopping");
        const boughtCount = state.shoppingList.filter((item) => item.bought).length;

        root.innerHTML = `
          <div class="stats-grid">
            <div class="mini-card glass"><small>總項目</small><strong>${state.shoppingList.length}</strong></div>
            <div class="mini-card glass"><small>已買</small><strong>${boughtCount}</strong></div>
            <div class="mini-card glass"><small>未買</small><strong>${state.shoppingList.length - boughtCount}</strong></div>
          </div>

          <div class="section-card glass">
            <h3 class="panel-title">新增購物項目</h3>
            <div class="input-grid three">
              <input id="shopping-name" class="input" placeholder="例如：鳳梨酥 / 面膜 / 小廢包" />
              <select id="shopping-area" class="input">
                <option>手信</option><option>藥妝</option><option>演出</option><option>穿搭</option><option>雜貨</option>
              </select>
              <button id="add-shopping" class="btn">加入清單</button>
            </div>
          </div>

          <div class="record-list">
            ${state.shoppingList
              .map((item) => `
                <div class="row-card glass">
                  <div class="row-top">
                    <div style="display:flex;align-items:center;gap:10px;">
                      <button class="btn-outline btn" data-toggle-shopping="${item.id}">${item.bought ? "✓" : "○"}</button>
                      <div style="flex:1;">
                        <div style="font-weight:800;color:var(--text-strong);${item.bought ? "text-decoration:line-through;color:#a2a9bb;" : ""}">${escapeHtml(item.name)}</div>
                        <div style="font-size:.92rem;color:#8a92a8;">${escapeHtml(item.area)}</div>
                        <div style="margin-top:12px;display:grid;gap:10px;">
                          <label class="btn-outline btn" style="width:fit-content;cursor:pointer;">新增圖片
                            <input type="file" accept="image/*" data-shopping-photo="${item.id}" class="hidden" />
                          </label>
                          ${item.image ? `<div class="photo-preview" style="max-width:260px;"><img src="${item.image}" alt="${escapeHtml(item.name)}" /></div>` : ""}
                        </div>
                      </div>
                    </div>
                  </div>
                  <button class="btn-outline btn" data-remove-shopping="${item.id}">刪除</button>
                </div>
              `)
              .join("")}
          </div>
        `;

        document.getElementById("add-shopping").addEventListener("click", () => {
          const name = document.getElementById("shopping-name").value.trim();
          const area = document.getElementById("shopping-area").value;
          if (!name) return;
          state.shoppingList.push({ id: uid(), name, area, bought: false, image: "" });
          saveState();
          renderShoppingPage();
        });

        root.querySelectorAll("[data-toggle-shopping]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = Number(btn.dataset.toggleShopping);
            state.shoppingList = state.shoppingList.map((item) => item.id === id ? { ...item, bought: !item.bought } : item);
            saveState();
            renderShoppingPage();
          });
        });

        root.querySelectorAll("[data-shopping-photo]").forEach((input) => {
          input.addEventListener("change", (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const id = Number(e.target.dataset.shoppingPhoto);
            const reader = new FileReader();
            reader.onload = () => {
              state.shoppingList = state.shoppingList.map((item) => item.id === id ? { ...item, image: reader.result } : item);
              saveState();
              renderShoppingPage();
            };
            reader.readAsDataURL(file);
          });
        });

        root.querySelectorAll("[data-remove-shopping]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = Number(btn.dataset.removeShopping);
            state.shoppingList = state.shoppingList.filter((item) => item.id !== id);
            saveState();
            renderShoppingPage();
          });
        });
      }

      function renderMilkTeaPage() {
        const root = document.getElementById("page-milktea");
        const ranking = [...state.milkTeaSpots].sort((a, b) => (b.rating !== a.rating ? b.rating - a.rating : (Number(a.price) || 9999) - (Number(b.price) || 9999)));
        const king = ranking.find((item) => item.rating > 0);

        root.innerHTML = `
          ${king ? `
            <div class="king-card glass">
              <div class="king-title">👑 珍奶之王</div>
              <h2>#1 ${escapeHtml(king.shop)}</h2>
              <div style="margin-top:8px;font-size:.95rem;">${king.drink ? `目前領先飲品：${escapeHtml(king.drink)}` : "目前衝上第一位"}</div>
            </div>
          ` : ""}

          <div class="section-card glass">
            <h3 class="panel-title">新增珍奶店</h3>
            <div class="input-grid two">
              <select id="tea-shop" class="input">
                <option value="">請選擇珍奶地圖名單</option>
                ${milkTeaMapList.map((name) => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join("")}
              </select>
              <input id="tea-custom-shop" class="input hidden" placeholder="輸入偶遇到的好店名字" />
              <input id="tea-drink" class="input" placeholder="你買咗咩，例如 烏龍珍奶" />
              <input id="tea-price" class="input" placeholder="價錢 NT$" />
              <textarea id="tea-notes" class="input" placeholder="備註（可留空）"></textarea>
            </div>
            <div style="margin-top:12px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;background:#fff4f9;padding:14px 16px;border-radius:18px;">
              <span style="font-size:.92rem;font-weight:700;">先比個初始評分</span>
              <div id="new-tea-stars" class="stars"></div>
            </div>
            <div style="margin-top:12px;"><button id="add-tea" class="btn">加入排行榜</button></div>
          </div>

          <div class="milk-list">
            ${ranking
              .map((spot, index) => `
                <div class="row-card glass rank-item">
                  <div class="row-top">
                    <div class="rank-head">
                      <div class="rank-dot">${index + 1}</div>
                      <strong style="font-size:1.08rem;color:var(--text-strong);">${escapeHtml(spot.shop)}</strong>
                      ${index === 0 && spot.rating > 0 ? `<span class="king-badge">珍奶之王</span>` : ""}
                    </div>
                    <div style="font-size:.95rem;line-height:1.7;">${spot.drink ? `你買咗：${escapeHtml(spot.drink)}` : "未寫飲品"}<br />價錢：NT$ ${escapeHtml(spot.price || "--")} ${spot.notes ? `<br />備註：${escapeHtml(spot.notes)}` : ""}</div>
                  </div>
                  <div class="row-side">
                    <div class="stars" data-rating-id="${spot.id}"></div>
                    <input class="input" data-edit-drink="${spot.id}" value="${escapeAttr(spot.drink || "")}" placeholder="更新飲品名稱" />
                    <input class="input" data-edit-price="${spot.id}" value="${escapeAttr(spot.price || "")}" placeholder="更新價錢" />
                    <button class="btn-outline btn" data-remove-tea="${spot.id}">刪除</button>
                  </div>
                </div>
              `)
              .join("")}
          </div>
        `;

        let newTeaRating = 0;
        const newStarsRoot = document.getElementById("new-tea-stars");
        renderStars(newStarsRoot, newTeaRating, (value) => {
          newTeaRating = value;
          renderStars(newStarsRoot, newTeaRating, (v) => {
            newTeaRating = v;
            renderStars(newStarsRoot, newTeaRating, arguments.callee);
          });
        });

        const teaShop = document.getElementById("tea-shop");
        const teaCustom = document.getElementById("tea-custom-shop");
        const teaDrink = document.getElementById("tea-drink");

        teaShop.addEventListener("change", () => {
          const isCustom = teaShop.value === "新增別家";
          teaCustom.classList.toggle("hidden", !isCustom);
          teaDrink.placeholder = isCustom ? "你買咗咩，例如 絲襪奶茶 / 熟成紅茶歐蕾" : "你買咗咩，例如 烏龍珍奶";
        });

        document.getElementById("add-tea").addEventListener("click", () => {
          const shopValue = teaShop.value;
          const actualShop = shopValue === "新增別家" ? teaCustom.value.trim() : shopValue;
          const drink = teaDrink.value.trim();
          const price = document.getElementById("tea-price").value.trim();
          const notes = document.getElementById("tea-notes").value.trim();
          if (!actualShop) return;
          state.milkTeaSpots.push({ id: uid(), shop: actualShop, drink, price, rating: newTeaRating, notes });
          saveState();
          renderMilkTeaPage();
        });

        ranking.forEach((spot) => {
          const starsRoot = root.querySelector(`[data-rating-id='${spot.id}']`);
          renderStars(starsRoot, spot.rating, (value) => {
            state.milkTeaSpots = state.milkTeaSpots.map((item) => item.id === spot.id ? { ...item, rating: value } : item);
            saveState();
            renderMilkTeaPage();
          });
        });

        root.querySelectorAll("[data-edit-drink]").forEach((input) => {
          input.addEventListener("input", () => {
            const id = Number(input.dataset.editDrink);
            state.milkTeaSpots = state.milkTeaSpots.map((item) => item.id === id ? { ...item, drink: input.value } : item);
            saveState();
          });
        });

        root.querySelectorAll("[data-edit-price]").forEach((input) => {
          input.addEventListener("input", () => {
            const id = Number(input.dataset.editPrice);
            state.milkTeaSpots = state.milkTeaSpots.map((item) => item.id === id ? { ...item, price: input.value } : item);
            saveState();
          });
        });

        root.querySelectorAll("[data-remove-tea]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = Number(btn.dataset.removeTea);
            state.milkTeaSpots = state.milkTeaSpots.filter((item) => item.id !== id);
            saveState();
            renderMilkTeaPage();
          });
        });
      }

      function renderInfoPage() {
        const root = document.getElementById("page-info");
        root.innerHTML = `
          <div class="section-card glass">
            <h3 class="panel-title">旅程資訊</h3>
            <div style="display:grid;gap:12px;font-size:.95rem;line-height:1.75;">
              <div><strong style="color:var(--text-strong);">住宿：</strong>Airbnb</div>
              <a class="info-line map-link" href="https://maps.google.com/?q=${encodeURIComponent("台北市松山區復興北路469號")}" target="_blank" rel="noreferrer"><span>📍 台北市松山區復興北路469號</span></a>
              <div><strong style="color:var(--text-strong);">去程：</strong>STARLUX JX234</div>
              <div><strong style="color:var(--text-strong);">回程：</strong>STARLUX JX235</div>
            </div>
          </div>
          <div class="section-card glass">
            <h3 class="panel-title">全旅程步行統計</h3>
            <div class="info-grid">
              ${walkingStats.map((item) => `
                <div class="mini-card">
                  <small>${item.day}</small>
                  <strong>${item.steps}</strong>
                  <div style="font-size:.8rem;color:#9ba3b8;">步</div>
                </div>
              `).join("")}
            </div>
            <div style="margin-top:14px;" class="soft-pill">平均：約 5000 步 / 天</div>
          </div>
        `;
      }

      function setPage(page) {
        currentPage = page;
        document.querySelectorAll(".page").forEach((el) => el.classList.remove("active"));
        document.getElementById(`page-${page}`).classList.add("active");
        document.querySelectorAll(".nav-btn").forEach((btn) => btn.classList.toggle("active", btn.dataset.page === page));
      }

      function renderStars(root, value, onClick) {
        if (!root) return;
        root.innerHTML = "";
        for (let i = 1; i <= 5; i += 1) {
          const btn = document.createElement("button");
          btn.className = `star-btn ${i <= value ? "active" : ""}`;
          btn.textContent = "★";
          btn.addEventListener("click", () => onClick(i));
          root.appendChild(btn);
        }
      }

      function renderAll() {
        renderDayRow();
        renderItineraryPage();
        renderExpensesPage();
        renderShoppingPage();
        renderMilkTeaPage();
        renderInfoPage();
        setPage(currentPage);
      }

      document.querySelectorAll(".nav-btn").forEach((btn) => {
        btn.addEventListener("click", () => setPage(btn.dataset.page));
      });

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeAttr(str) {
        return escapeHtml(str).replaceAll("`", "&#96;");
      }

      renderAll();
    </script>
  </body>
</html>
