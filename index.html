    <style>
      :root {
        --bg1: #fff6fb;
        --bg2: #eef7ff;
        --bg3: #f1eeff;
        --card: rgba(255, 255, 255, 0.78);
        --card-strong: rgba(255, 255, 255, 0.9);
        --text: #4c5566;
        --text-strong: #2e3440;
        --pink: #f8bfd6;
        --pink-strong: #ef78ab;
        --blue: #b9dcff;
        --blue-strong: #6f9fdf;
        --cyan: #c7f0ff;
        --yellow: #ffe9a8;
        --shadow: 0 18px 50px rgba(137, 167, 220, 0.16);
        --radius: 28px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(255,255,255,0.98), rgba(255,237,248,0.95), rgba(232,243,255,0.95), rgba(232,229,255,0.93));
        min-height: 100vh;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app {
        max-width: 1120px;
        margin: 0 auto;
        padding: 20px 16px 110px;
      }

      .glass {
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      .hero {
        position: relative;
        overflow: hidden;
        border-radius: 34px;
        padding: 24px;
      }

      .hero::before,
      .hero::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(44px);
        pointer-events: none;
      }

      .hero::before {
        width: 160px;
        height: 160px;
        top: -20px;
        right: -40px;
        background: rgba(255, 191, 214, 0.4);
      }

      .hero::after {
        width: 140px;
        height: 140px;
        left: -24px;
        bottom: -24px;
        background: rgba(185, 220, 255, 0.45);
      }

      .hero-top {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .title {
        margin: 0;
        font-size: clamp(1.9rem, 4vw, 3.5rem);
        line-height: 1.1;
        color: var(--text-strong);
        letter-spacing: 0.02em;
        font-weight: 900;
      }

      .sub {
        margin-top: 12px;
        font-size: 0.98rem;
        line-height: 1.7;
      }

      .rate-box {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.75);
        border-radius: 24px;
        padding: 14px 16px;
        box-shadow: 0 10px 26px rgba(145, 170, 235, 0.12);
      }

      .rate-box small {
        display: block;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #94a0b8;
        font-weight: 700;
        font-size: 0.72rem;
      }

      .rate-box strong {
        display: block;
        margin-top: 8px;
        color: var(--text-strong);
        font-size: 1.6rem;
      }

      .day-row {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding: 18px 2px 2px;
      }

      .day-chip {
        min-width: 94px;
        border: 1px solid rgba(255,255,255,0.75);
        background: rgba(255,255,255,0.82);
        border-radius: 24px;
        padding: 14px 16px;
        text-align: center;
        color: #6c7386;
        box-shadow: 0 10px 28px rgba(145, 170, 235, 0.1);
        cursor: pointer;
      }

      .day-chip.active {
        color: #fff;
        border-color: #b7d7ff;
        background: linear-gradient(180deg, #8ab6ff 0%, #6d95dc 100%);
        box-shadow: 0 14px 30px rgba(109, 149, 220, 0.3);
      }

      .day-chip .label {
        font-size: 0.92rem;
        font-weight: 700;
      }

      .day-chip .num {
        margin-top: 2px;
        font-size: 1.6rem;
        font-weight: 900;
      }

      .page {
        display: none;
        margin-top: 18px;
      }

      .page.active {
        display: block;
      }

      .section-card {
        border-radius: 30px;
        padding: 20px;
        margin-bottom: 18px;
      }

      .summary-card {
        display: flex;
        flex-direction: column;
        gap: 16px;
        border-radius: 30px;
        padding: 20px;
        background: linear-gradient(135deg, rgba(218,242,255,0.95), rgba(255,242,248,0.95));
      }

      .summary-head {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .summary-head h2 {
        margin: 0;
        font-size: 2rem;
        color: var(--text-strong);
      }

      .date-pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: rgba(255,255,255,0.78);
        padding: 6px 12px;
        font-size: 0.8rem;
        font-weight: 700;
        box-shadow: 0 6px 18px rgba(145,170,235,0.12);
        width: fit-content;
      }

      .weather-box {
        border-radius: 24px;
        background: rgba(255,255,255,0.82);
        padding: 16px 18px;
        box-shadow: 0 10px 24px rgba(145, 170, 235, 0.12);
      }

      .weather-main {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--text-strong);
      }

      .weather-sub {
        margin-top: 8px;
        font-size: 0.92rem;
        color: #7b8399;
      }

      .itinerary-list,
      .record-list,
      .checklist-grid,
      .milk-list {
        display: grid;
        gap: 16px;
      }

      .itinerary-card {
        position: relative;
        overflow: hidden;
        border-radius: 30px;
        padding: 20px;
      }

      .stop-tag {
        position: absolute;
        top: 16px;
        right: 16px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(255, 232, 241, 0.95);
        color: #d35e8c;
        font-size: 0.76rem;
        font-weight: 800;
      }

      .time-row {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #7a8297;
        font-weight: 700;
        font-size: 0.9rem;
      }

      .itinerary-card h3 {
        margin: 14px 0 0;
        font-size: 1.75rem;
        line-height: 1.15;
        color: var(--text-strong);
      }

      .desc {
        margin-top: 12px;
        line-height: 1.75;
        font-size: 0.95rem;
      }

      .info-blocks {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .info-line,
      .milk-box,
      .transit-box,
      .photo-box,
      .check-item,
      .row-card,
      .mini-card,
      .input,
      .btn,
      .king-card,
      .challenge-card {
        border-radius: 20px;
      }

      .info-line,
      .photo-box,
      .row-card,
      .mini-card,
      .input {
        background: rgba(255,255,255,0.75);
      }

      .info-line,
      .photo-box,
      .row-card,
      .transit-box,
      .milk-box,
      .challenge-card,
      .king-card,
      .mini-card {
        box-shadow: 0 10px 24px rgba(145,170,235,0.1);
      }

      .info-line,
      .photo-box,
      .row-card,
      .transit-box,
      .milk-box,
      .challenge-card,
      .king-card {
        padding: 14px 16px;
      }

      .info-line {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .map-link span {
        text-decoration: underline;
        text-decoration-color: #8fd8ff;
        text-underline-offset: 3px;
      }

      .milk-box {
        background: linear-gradient(90deg, #fff4f9, #ffffff, #f7f3ff);
      }

      .block-title {
        font-size: 0.9rem;
        font-weight: 800;
        color: var(--text-strong);
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .milk-items,
      .transit-items,
      .challenge-items {
        display: grid;
        gap: 8px;
      }

      .pill {
        padding: 10px 12px;
        background: rgba(255,255,255,0.74);
        border-radius: 16px;
        font-size: 0.92rem;
      }

      .transit-box {
        background: #f7fbff;
      }

      .return-card,
      .walk-card {
        border-radius: 28px;
        padding: 18px;
      }

      .walk-card {
        font-weight: 700;
      }

      .checklist-grid {
        grid-template-columns: 1fr;
      }

      .check-group h3,
      .panel-title {
        margin: 0 0 14px;
        font-size: 1.2rem;
        color: var(--text-strong);
      }

      .check-items {
        display: grid;
        gap: 10px;
      }

      .check-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 13px 14px;
        background: rgba(255,255,255,0.75);
        cursor: pointer;
      }

      .check-item.done span:last-child {
        text-decoration: line-through;
        color: #a0a7ba;
      }

      .checkbox {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid #c7cde0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 0.78rem;
        flex-shrink: 0;
      }

      .check-item.done .checkbox {
        background: var(--pink-strong);
        border-color: var(--pink-strong);
      }

      .stats-grid,
      .info-grid {
        display: grid;
        gap: 14px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .mini-card {
        padding: 18px;
        border: 1px solid rgba(255,255,255,0.65);
      }

      .mini-card small {
        display: block;
        color: #9ba3b8;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-weight: 800;
      }

      .mini-card strong {
        display: block;
        margin-top: 10px;
        font-size: 1.95rem;
        color: var(--text-strong);
      }

      .input-grid {
        display: grid;
        gap: 12px;
      }

      .input,
      select,
      textarea {
        width: 100%;
        border: 1px solid rgba(255,255,255,0.7);
        padding: 13px 14px;
        font: inherit;
        color: var(--text);
        background: rgba(255,255,255,0.8);
        outline: none;
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      .btn {
        border: none;
        cursor: pointer;
        padding: 13px 16px;
        font: inherit;
        font-weight: 800;
        color: var(--text-strong);
        background: linear-gradient(90deg, #f7c6dd, #c8efff);
      }

      .btn-outline {
        background: rgba(255,255,255,0.85);
        border: 1px solid #dbe2f0;
        font-weight: 700;
      }

      .row-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
      }

      .row-top {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .amount-pill,
      .king-badge,
      .rank-dot,
      .soft-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .amount-pill,
      .soft-pill {
        border-radius: 999px;
        padding: 10px 14px;
        font-weight: 800;
      }

      .amount-pill {
        background: #fff1f7;
      }

      .king-card {
        background: linear-gradient(90deg, #fff3ad, #ffe8f2, #dff7ff);
      }

      .king-title {
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.8rem;
        font-weight: 800;
      }

      .king-card h2 {
        margin: 14px 0 0;
        color: var(--text-strong);
        font-size: 2rem;
      }

      .rank-item {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .rank-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .rank-dot {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(90deg, #f6c8dd, #c8efff);
        font-weight: 800;
        color: var(--text-strong);
      }

      .king-badge {
        padding: 6px 10px;
        border-radius: 999px;
        background: #fff3ae;
        color: #8e6700;
        font-size: 0.72rem;
        font-weight: 800;
      }

      .stars {
        display: flex;
        gap: 6px;
      }

      .star-btn {
        background: transparent;
        border: none;
        cursor: pointer;
        font-size: 1.15rem;
        color: #d4d7e2;
        padding: 0;
      }

      .star-btn.active {
        color: #f6b41b;
      }

      .bottom-nav {
        position: fixed;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        width: min(92%, 980px);
        padding: 8px;
        border-radius: 30px;
        background: rgba(255,255,255,0.82);
        border: 1px solid rgba(255,255,255,0.75);
        backdrop-filter: blur(18px);
        box-shadow: 0 20px 60px rgba(145,170,235,0.2);
        z-index: 50;
      }

      .bottom-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }

      .nav-btn {
        border: none;
        border-radius: 22px;
        padding: 10px 6px;
        background: rgba(255,255,255,0.55);
        color: #6d758a;
        cursor: pointer;
        font: inherit;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .nav-btn.active {
        background: linear-gradient(180deg, #f7d2e7, #fceef8, #dbf5ff);
        color: var(--text-strong);
        box-shadow: 0 10px 20px rgba(145,170,235,0.12);
      }

      .nav-icon {
        display: block;
        font-size: 1rem;
        margin-bottom: 4px;
      }

      .hidden {
        display: none !important;
      }

      .photo-preview {
        margin-top: 10px;
        width: 100%;
        border-radius: 20px;
        overflow: hidden;
        background: #f8fbff;
        border: 1px solid rgba(255,255,255,0.75);
      }

      .photo-preview img {
        display: block;
        width: 100%;
        max-height: 240px;
        object-fit: cover;
      }

      @media (min-width: 760px) {
        .hero-top {
          flex-direction: row;
          justify-content: space-between;
          align-items: flex-start;
        }

        .summary-head {
          flex-direction: row;
          justify-content: space-between;
          align-items: center;
        }

        .checklist-grid {
          grid-template-columns: repeat(2, 1fr);
        }

        .stats-grid {
          grid-template-columns: repeat(3, 1fr);
        }

        .info-grid {
          grid-template-columns: repeat(5, 1fr);
        }

        .input-grid.two {
          grid-template-columns: repeat(2, 1fr);
        }

        .input-grid.three {
          grid-template-columns: repeat(3, 1fr);
        }

        .input-grid.four {
          grid-template-columns: repeat(4, 1fr);
        }

        .row-card {
          flex-direction: row;
          justify-content: space-between;
          align-items: flex-start;
        }

        .row-top {
          flex: 1;
        }

        .row-side {
          width: 280px;
          display: grid;
          gap: 12px;
        }
      }
.expense-top-card {

}

.expense-total-amount {

}

.expense-total-sub {
  text-align: center;
  font-size: 0.95rem;

  margin-top: 10px;

  color: #667085;

.expense-actions {
  margin-top: 12px;
  display: flex;

      .nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  min-height: 64px;
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
}

.nav-btn:hover {
  transform: translateY(-1px);
}

.nav-icon {
  display: block;
  font-size: 1.18rem;
  line-height: 1;
  margin-bottom: 2px;
  transition: transform 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
}

.nav-label {
  display: block;
  font-size: 0.74rem;
  line-height: 1;
  letter-spacing: 0.01em;
}

.nav-btn.active .nav-icon {
  transform: scale(1.14);
  filter: saturate(1.15);
}

.nav-btn.active .nav-label {
  color: var(--text-strong);
}

@media (max-width: 520px) {
  .bottom-grid {
    gap: 6px;
  }

  .nav-btn {
    min-height: 60px;
    padding: 8px 4px;
  }

  .nav-icon {
    font-size: 1.08rem;
  }

  .nav-label {
    font-size: 0.7rem;
  }
}
      .people-check-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.people-check-pill {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 10px;
  border-radius: 16px;
  background: rgba(255,255,255,0.75);
  border: 1px solid rgba(255,255,255,0.9);

  font-weight: 700;
  color: var(--text-strong);

      function buildChecklistDefault() {
        const checklistState = {};
        Object.entries(packingChecklistData).forEach(([category, items]) => {
          items.forEach((item) => {
            checklistState[`${category}-${item}`] = false;
          });
        });
        return checklistState;
      }

      function loadState() {
        const checklistState = buildChecklistDefault();
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return { ...defaultData, checklistState };
          const saved = JSON.parse(raw);
          return {
            ...defaultData,
            ...saved,
            checklistState: { ...checklistState, ...(saved.checklistState || {}) },
          };
        } catch {
          return { ...defaultData, checklistState };
        }
      }

     async function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  await db.collection("trips").doc(TRIP_CODE).set(state);
}

function subscribeTrip() {
  db.collection("trips").doc(TRIP_CODE).onSnapshot((doc) => {
    if (doc.exists) {
      const remote = doc.data();
      state = {
        ...defaultData,
        ...remote,
        checklistState: {
          ...buildChecklistDefault(),
          ...(remote.checklistState || {})
        }
      };
      renderAll();
    } else {
      db.collection("trips").doc(TRIP_CODE).set(state);
    }
  });
}

      function renderStars(root, value, onClick) {

        for (let i = 1; i <= 5; i += 1) {
          const btn = document.createElement("button");
          btn.className = `star-btn ${i <= value ? "active" : ""}`;
          btn.textContent = "★";
          btn.addEventListener("click", () => onClick(i));
          root.appendChild(btn);
        }
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeAttr(str) {
        return escapeHtml(str).replaceAll("`", "&#96;");
      }

      function getExpenseParticipants(item) {
  if (Array.isArray(item.splitWith) && item.splitWith.length) {
    return item.splitWith;
  }

  const count = Number(item.splitCount || 1);

  if (count === 1) {
    return item.payer ? [item.payer] : [];
  }

  if (count === 2) {
    return ["Krince", "Silke"];
  }

  return ["Krince", "Silke", "Ernest"];
}

function calculatePeopleBalance(expenses) {
  const people = {
    Krince: { paid: 0, owed: 0, net: 0 },
    Silke: { paid: 0, owed: 0, net: 0 },
    Ernest: { paid: 0, owed: 0, net: 0 },
  };

  expenses.forEach((item) => {
    const amount = Number(item.amount || 0);
    const payer = item.payer;
    const participants = getExpenseParticipants(item);
    const share = participants.length ? amount / participants.length : 0;

    if (people[payer]) {
      people[payer].paid += amount;
    }

    participants.forEach((name) => {
      if (people[name]) {
        people[name].owed += share;
      }
    });
  });

  Object.keys(people).forEach((name) => {
    people[name].net = people[name].paid - people[name].owed;
  });

  return people;
}
